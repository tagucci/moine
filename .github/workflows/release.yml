name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  check-rust-msrv:
    name: Check Rust MSRV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install Rust 1.86.0
        uses: dtolnay/rust-toolchain@1.86.0
        with:
          targets: wasm32-unknown-unknown
      - name: Check workspace on MSRV
        run: cargo check --workspace --all-targets --all-features

  check-rust-release:
    name: Check Rust release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - name: Check formatting
        run: cargo fmt --check
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run tests
        run: cargo test
      - name: Test root crate without default features
        run: cargo test -p moine --no-default-features
      - name: Build browser demo crate
        run: cargo build -p moine-wasm --target wasm32-unknown-unknown
      - name: Build documentation
        run: RUSTDOCFLAGS='-D warnings' cargo doc --workspace --no-deps
      - name: Check umbrella crate missing docs
        run: cargo rustdoc -p moine --lib -- -W missing_docs
      - name: Check core crate missing docs
        run: cargo rustdoc -p moine-core --lib -- -W missing_docs
      - name: List packaged Rust crate files
        run: |
          cargo package --list -p moine-core
          cargo package --list -p moine-ja
          cargo package --list -p moine-zh
          cargo package --list -p moine-cli
          cargo package --list -p moine

  check-artifact-assets:
    name: Check dictionary release assets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
    steps:
      - name: Check baked-in artifact asset URLs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          check_asset() {
            local tag="$1"
            local asset="$2"

            gh release view "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --json assets \
              --jq ".assets[].name" \
              | grep -Fx "$asset"
          }

          check_asset "unidic-cwj-202512-v0.1.1" "moine-unidic-cwj-202512.tar.gz"
          check_asset "unidic-cwj-202512-v0.1.1" "moine-unidic-cwj-202512.tar.zst"
          check_asset "moine-sudachi-full-20260428-v0.2.0" "moine-sudachi-full-20260428.tar.gz"
          check_asset "moine-sudachi-full-20260428-v0.2.0" "moine-sudachi-full-20260428.tar.zst"
          check_asset "moine-cedict-20260520-v0.1.1" "moine-cedict-20260520.tar.gz"
          check_asset "moine-cedict-20260520-v0.1.1" "moine-cedict-20260520.tar.zst"

  build-sdist:
    name: Build Python sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Build sdist
        run: uv run --python 3.12 --isolated --no-project --with 'maturin>=1.9,<2' maturin sdist --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-sdist
          path: dist/*
          if-no-files-found: error

  build-linux-wheels:
    name: Build Linux wheel (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          manylinux: "2_28"
          args: --release --locked --compatibility pypi --out dist -i python${{ matrix.python-version }}
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-linux-${{ matrix.python-version }}
          path: dist/*
          if-no-files-found: error

  build-native-wheels:
    name: Build ${{ matrix.os }} wheel (${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --locked --compatibility pypi --out dist -i python
      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: python-dist-${{ matrix.os }}-${{ matrix.python-version }}
          path: dist/*
          if-no-files-found: error

  check-python-dist:
    name: Check Python distributions
    runs-on: ubuntu-latest
    needs:
      - build-sdist
      - build-linux-wheels
      - build-native-wheels
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist
          merge-multiple: true
      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.12"
          enable-cache: true
      - name: List distributions
        run: ls -lh dist
      - name: Check distributions
        run: uvx --from 'twine>=6,<7' twine check dist/*

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - check-rust-msrv
      - check-rust-release
      - check-artifact-assets
      - check-python-dist
    if: startsWith(github.ref, 'refs/tags/v')
    environment: release
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          pattern: python-dist-*
          path: dist
          merge-multiple: true
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
